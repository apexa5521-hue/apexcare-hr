<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تحديث وثائق موظف | Update Employee Documents</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0D2137; --blue:#2563EB; --teal:#0D9488;
      --bg:#F1F5F9; --surface:#FFFFFF; --border:#CBD5E1;
      --text:#0F172A; --sub:#64748B; --danger:#EF4444; --success:#10B981;
      --r:10px; --shadow:0 4px 20px rgba(13,33,55,0.10);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Tajawal','Inter',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}
    .lang-bar{background:var(--navy);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;}
    .lang-bar-title{color:rgba(255,255,255,0.65);font-size:12px;}
    .lang-btns{display:flex;gap:6px;}
    .lang-btn{padding:4px 12px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.65);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;}
    .lang-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
    .page-wrap{min-height:calc(100vh - 41px);display:flex;flex-direction:column;align-items:center;padding:28px 16px 48px;}
    .container{width:100%;max-width:560px;}
    .brand-header{text-align:center;margin-bottom:24px;}
    .brand-icon{width:64px;height:64px;background:linear-gradient(145deg,var(--navy),var(--teal));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin-bottom:12px;box-shadow:0 8px 24px rgba(13,33,55,0.25);}
    .brand-name{font-size:22px;font-weight:800;color:var(--navy);}
    .brand-sub{font-size:13px;color:var(--sub);margin-top:4px;}
    .card{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}
    .card-head{background:linear-gradient(135deg,var(--navy),var(--teal));padding:22px 26px;}
    .card-head-title{font-size:16px;font-weight:700;color:#fff;}
    .card-head-sub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:4px;}
    .card-body{padding:24px 26px;}
    .alert{display:none;align-items:flex-start;gap:8px;padding:10px 14px;border-radius:var(--r);font-size:12px;font-weight:500;margin-bottom:14px;}
    .alert.show{display:flex;}
    .alert-error  {background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;}
    .alert-success{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}
    .alert-info   {background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD;}
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    label{font-size:13px;font-weight:600;color:var(--text);}
    label .req{color:var(--danger);margin-right:2px;}
    input{font-family:inherit;font-size:14px;color:var(--text);background:#F8FAFC;border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;outline:none;transition:all 0.2s;width:100%;}
    input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
    .emp-card{display:none;background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:var(--r);padding:12px 14px;margin-bottom:16px;}
    .emp-card.show{display:block;}
    .emp-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
    .emp-lbl{color:var(--sub);}
    .emp-val{font-weight:700;color:var(--navy);}
    .section{background:var(--surface);border-radius:var(--r);border:1.5px solid var(--border);overflow:hidden;margin-bottom:14px;}
    .section-head{background:#F8FAFC;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--navy);}
    .section-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
    .doc-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;background:#F8FAFC;border-radius:8px;border:1px solid #E2E8F0;}
    .doc-name{font-size:12px;font-weight:600;color:var(--text);flex:1;}
    .doc-name .tag{font-size:10px;font-weight:500;color:var(--sub);margin-right:4px;}
    .status-select{font-family:inherit;font-size:12px;padding:5px 8px;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--text);cursor:pointer;outline:none;min-width:120px;}
    .status-select:focus{border-color:var(--blue);}
    .status-select.done   {border-color:var(--success);background:#F0FDF4;color:#065F46;}
    .status-select.pending{border-color:#FCD34D;background:#FEFCE8;color:#92400E;}
    .status-select.na     {border-color:#CBD5E1;background:#F1F5F9;color:#64748B;}
    .btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;width:100%;}
    .btn-primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;box-shadow:0 4px 12px rgba(37,99,235,0.2);}
    .btn-primary:hover:not(:disabled){transform:translateY(-1px);}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-teal{background:linear-gradient(135deg,var(--navy),var(--teal));color:#fff;box-shadow:0 4px 12px rgba(13,148,136,0.2);}
    .btn-teal:hover:not(:disabled){transform:translateY(-1px);}
    .btn-ghost{background:transparent;color:var(--sub);border:1.5px solid var(--border);margin-top:8px;}
    .btn-ghost:hover{background:#F1F5F9;}
    .docs-section{display:none;}
    .docs-section.show{display:block;}
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .page-foot{text-align:center;margin-top:18px;font-size:12px;color:var(--sub);}
    html[lang="en"] body{direction:ltr;font-family:'Inter','Tajawal',sans-serif;}
  </style>
</head>
<body>

<div class="lang-bar">
  <span class="lang-bar-title">نظام الموارد البشرية الرقمي</span>
  <div class="lang-btns">
    <button class="lang-btn active" onclick="setLang('ar')">عربي</button>
    <button class="lang-btn"        onclick="setLang('en')">English</button>
  </div>
</div>

<div class="page-wrap">
  <div class="container">
    <div class="brand-header">
      <div class="brand-icon">HR</div>
      <div class="brand-name">تحديث وثائق موظف</div>
      <div class="brand-sub">Update Employee Documents</div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-head-title" id="ch-title">البحث عن موظف</div>
        <div class="card-head-sub"   id="ch-sub">ادخل الرقم الوظيفي لعرض وتحديث وثائقه</div>
      </div>
      <div class="card-body">
        <div class="alert" id="main-alert"><span class="alert-msg"></span></div>

        <!-- Search -->
        <div class="field">
          <label for="empId">الرقم الوظيفي <span class="req">*</span></label>
          <input type="text" id="empId" placeholder="EMP-001" autocomplete="off">
        </div>
        <button class="btn btn-teal" onclick="findEmployee()" id="btn-find">
          <span id="btn-find-lbl">بحث / Search</span>
        </button>

        <!-- Employee card -->
        <div class="emp-card" id="emp-card" style="margin-top:16px;">
          <div class="emp-row"><span class="emp-lbl">الاسم / Name</span><span class="emp-val" id="pv-name">—</span></div>
          <div class="emp-row"><span class="emp-lbl">القسم / Dept</span><span class="emp-val" id="pv-dept">—</span></div>
          <div class="emp-row"><span class="emp-lbl">الحالة / Status</span><span class="emp-val" id="pv-status">—</span></div>
        </div>

        <!-- Docs -->
        <div class="docs-section" id="docs-section">

          <div class="section">
            <div class="section-head">الوثائق الإلزامية / Mandatory Documents</div>
            <div class="section-body" id="mandatory-docs"></div>
          </div>

          <div class="section">
            <div class="section-head">الوثائق الجديدة / New Documents</div>
            <div class="section-body" id="new-docs"></div>
          </div>

          <div class="section">
            <div class="section-head">عند الطلب / Upon Request</div>
            <div class="section-body" id="optional-docs"></div>
          </div>

          <button class="btn btn-primary" onclick="saveChanges()" id="btn-save">
            <span id="btn-save-lbl">حفظ التغييرات / Save</span>
          </button>
          <button class="btn btn-ghost" onclick="resetForm()">موظف آخر / Another Employee</button>

        </div>
      </div>
    </div>
    <div class="page-foot">HR System © 2025 | APEXCARE</div>
  </div>
</div>

<script>
  var GAS_URL = "https://script.google.com/macros/s/AKfycbzOcf_SaSZ4na9lYjIajTLkT3-apapMxoPruXRG6UCFTIm5UujF_JEYh9mCOL-Mg7pQ2Q/exec";

  var currentEmpId  = '';
  var currentRowNum = 0;

  var MANDATORY_DOCS = [
    { key: 'الهوية الوطنية',   col: 11 },
    { key: 'ترخيص الهيئة',    col: 12 },
    { key: 'شهادة BLS',        col: 13 },
    { key: 'نموذج التعريف',    col: 14 },
    { key: 'التوصيف الوظيفي',  col: 15 }
  ];

  var NEW_DOCS = [
    { key: 'سيرة ذاتية',                    col: 19 },
    { key: 'شهادة الداتا فلو',              col: 20 },
    { key: 'شهادة الخبرات السابقة',         col: 21 },
    { key: 'التسجيل المهني (وزارة الصحة)',  col: 22 },
    { key: 'عقد العمل',                     col: 23 },
    { key: 'تقييم الأداء',                  col: 24 },
    { key: 'إقرار السرية',                  col: 25 }
  ];

  var OPTIONAL_DOCS = [
    { key: 'المؤهل العلمي',            col: 16 },
    { key: 'الدورات',                  col: 17 },
    { key: 'تأمين الأخطاء الطبية',     col: 18 }
  ];

  function setLang(l) {
    document.getElementById('html-root').setAttribute('lang', l);
    document.getElementById('html-root').setAttribute('dir', l==='ar'?'rtl':'ltr');
    document.querySelectorAll('.lang-btn').forEach(function(b){
      b.classList.toggle('active',(l==='ar'&&b.textContent==='عربي')||(l==='en'&&b.textContent==='English'));
    });
  }

  function findEmployee() {
    var id = document.getElementById('empId').value.trim();
    if (!id) { showAlert('error', 'يرجى ادخال الرقم الوظيفي'); return; }

    var btn = document.getElementById('btn-find');
    var lbl = document.getElementById('btn-find-lbl');
    btn.disabled = true;
    lbl.innerHTML = '<div class="spinner"></div>';
    showAlert('info', 'جاري البحث...');

    fetch(GAS_URL + '?action=getEmployee&empId=' + encodeURIComponent(id))
      .then(function(r){ return r.json(); })
      .then(function(res) {
        btn.disabled = false;
        lbl.textContent = 'بحث / Search';
        clearAlert();

        if (!res || !res.name) {
          showAlert('error', 'الموظف غير موجود في الشيت');
          return;
        }

        currentEmpId  = id;
        currentRowNum = res.rowNum;

        document.getElementById('pv-name').textContent   = res.name   || '—';
        document.getElementById('pv-dept').textContent   = res.dept   || '—';
        document.getElementById('pv-status').textContent = res.status || '—';
        document.getElementById('emp-card').classList.add('show');

        renderDocs('mandatory-docs', MANDATORY_DOCS, res.docValues, false);
        renderDocs('new-docs',       NEW_DOCS,       res.docValues, false);
        renderDocs('optional-docs',  OPTIONAL_DOCS,  res.docValues, true);
        document.getElementById('docs-section').classList.add('show');
      })
      .catch(function(e) {
        btn.disabled = false;
        lbl.textContent = 'بحث / Search';
        showAlert('error', e.message || 'خطأ في الاتصال');
      });
  }

  function renderDocs(containerId, docs, vals, isOptional) {
    var html = '';
    docs.forEach(function(d) {
      var currentVal = vals ? (vals[d.col] || '') : '';
      var isDone = currentVal === '✓';
      var isNA   = currentVal === 'N/A';
      var selClass = isDone ? 'done' : (isNA ? 'na' : 'pending');
      var tagHtml = isOptional ? '<span class="tag">(عند الطلب)</span>' : '';

      html += '<div class="doc-row">';
      html += '<div class="doc-name">' + tagHtml + d.key + '</div>';
      html += '<select class="status-select ' + selClass + '" id="doc-' + d.col + '" onchange="updateSelectStyle(this)">';
      html += '<option value=""'    + (!isDone&&!isNA ? 'selected' : '') + '>لم ترفع / Not Uploaded</option>';
      html += '<option value="✓"'   + (isDone ? 'selected' : '')         + '>مرفوعة / Uploaded</option>';
      html += '<option value="N/A"' + (isNA   ? 'selected' : '')         + '>غير مطلوبة / N/A</option>';
      html += '</select>';
      html += '</div>';
    });
    document.getElementById(containerId).innerHTML = html;
  }

  function updateSelectStyle(sel) {
    sel.className = 'status-select';
    if      (sel.value === '✓')   sel.classList.add('done');
    else if (sel.value === 'N/A') sel.classList.add('na');
    else                          sel.classList.add('pending');
  }

  function saveChanges() {
    if (!currentEmpId || !currentRowNum) return;

    var btn = document.getElementById('btn-save');
    var lbl = document.getElementById('btn-save-lbl');
    btn.disabled = true;
    lbl.innerHTML = '<div class="spinner"></div>';

    var updates = {};
    var allDocs = MANDATORY_DOCS.concat(NEW_DOCS).concat(OPTIONAL_DOCS);
    allDocs.forEach(function(d) {
      var sel = document.getElementById('doc-' + d.col);
      if (sel) updates[d.col] = sel.value;
    });

    fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action:   'updateDocs',
        rowNum:   currentRowNum,
        updates:  updates
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(res) {
      btn.disabled = false;
      lbl.textContent = 'حفظ التغييرات / Save';
      if (res.success) showAlert('success', 'تم حفظ التغييرات بنجاح ✅');
      else showAlert('error', res.message || 'حدث خطأ');
    })
    .catch(function(e) {
      btn.disabled = false;
      lbl.textContent = 'حفظ التغييرات / Save';
      showAlert('error', e.message || 'خطأ في الاتصال');
    });
  }

  function resetForm() {
    currentEmpId  = '';
    currentRowNum = 0;
    document.getElementById('empId').value = '';
    document.getElementById('emp-card').classList.remove('show');
    document.getElementById('docs-section').classList.remove('show');
    document.getElementById('mandatory-docs').innerHTML = '';
    document.getElementById('new-docs').innerHTML = '';
    document.getElementById('optional-docs').innerHTML  = '';
    clearAlert();
  }

  function showAlert(type, msg) {
    var el = document.getElementById('main-alert');
    el.className = 'alert alert-' + type + ' show';
    el.querySelector('.alert-msg').textContent = msg;
  }
  function clearAlert(){ document.getElementById('main-alert').className = 'alert'; }
</script>
</body>
</html>
